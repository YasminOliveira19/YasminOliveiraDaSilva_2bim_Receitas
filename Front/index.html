<!DOCTYPE html>
<html>

<head>
    <title>Projeto DW1 2°Bimestre</title>
    <link rel="stylesheet" href="index.css">
</head>

<body>

    <header>
        <h1>Receitas</h1>
    </header>

    <main>
        <section class="container">

            <div class="card">
                <h3>Todas as Receitas</h3>
                <button onclick="listarTodas()">Listar Todas</button>
                <div id="resultadoTodas" class="resultado">...</div>
            </div>


            <div class="card">
                <h3>Buscar por Categoria</h3>

                <label for="inputCategoria">Categoria</label>
                <input type="text" id="inputCategoria" placeholder="Digite a categoria">

                <button onclick="BuscarPorCategoria()">Buscar</button>

                <div id="resultadoCategoria" class="resultado">...</div>
            </div>

            <div class="card">
                <h3>Buscar por Ingrediente</h3>

                <label for="inputIngrediente">Ingrediente</label>
                <input type="text" id="inputIngrediente" placeholder="Digite o ingrediente">

                <button onclick="BuscarPorIngrediente()">Buscar</button>

                <div id="resultadoIngrediente" class="resultado">...</div>
            </div>

            <div class="card">
                <h3>Buscar por Tempo de Preparo</h3>

                <label for="inputTempo">Tempo de preparo</label>
                <input type="number" id="inputTempo" placeholder="Digite o tempo">

                <button onclick="buscarPorTempo()">Buscar</button>

                <div id="resultadoTempo" class="resultado">...</div>
            </div>

        </section>
    </main>
    <footer>
        <p>Yasmin Oliveira da Silva</p>
    </footer>
    <script src="script.js"></script>
</body>

</html>
